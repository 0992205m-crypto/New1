name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu 
          java-version: 17 

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable 
          cache: true

      # إنشاء مشروع جديد ونقل محتويات مجلد الأندرويد بدقة لتفادي الأخطاء
      - name: Generate Clean Android Structure
        run: |
          # حذف أي مجلد أندرويد قديم مسبب للتعارض أولاً
          rm -rf android
          
          # إنشاء تطبيق فلاتر مؤقت
          flutter create --platforms=android --org com.castbrowser.app clean_app
          
          # نقل مجلد android التابع للتطبيق الجديد إلى المجلد الرئيسي للمستودع
          mv clean_app/android .
          
          # تنظيف الملفات المؤقتة الزائدة لتهيئة البيئة
          rm -rf clean_app

      # ضبط إعدادات الـ SDK مع التأكد من تعديل الملف الصحيح داخل المجلد المستهدف
      - name: Force Update Android SDK Versions
        run: |
          # استخدام أمر البحث لضمان الوصول للملف وتعديله حتى لو اختلف مساره البرمجي الافتراضي
          find android -name "build.gradle" -exec sed -i 's/minSdkVersion.*/minSdkVersion 21/g' {} +
          find android -name "build.gradle" -exec sed -i 's/targetSdkVersion.*/targetSdkVersion 34/g' {} +
          find android -name "build.gradle" -exec sed -i 's/compileSdkVersion.*/compileSdkVersion 34/g' {} +

      - name: Get Dependencies
        run: flutter pub get

      # إضافة خطوة قبول تراخيص أندرويد تلقائياً (تمنع خطأ الـ Licenses الشائع في السيرفرات)
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK Final Release
        run: flutter build apk --release --no-tree-shake-icons

      # رفع الملف الناتج والتأكد من إيجاده بغض النظر عن المسارات الفرعية
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
