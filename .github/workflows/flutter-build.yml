name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Clean Build Cache
        run: flutter clean

      # هذه الخطوة تستخدم طريقة كتابة آمنة ومضمونة لا تتأثر بمشاكل نسخ علامات التنصيص نهائياً
      - name: Force Android SDK Versions via Gradle Configuration
        run: |
          echo "subprojects {" > gradle_patch.txt
          echo "    afterEvaluate { project ->" >> gradle_patch.txt
          echo "        if (project.hasProperty('android')) {" >> gradle_patch.txt
          echo "            project.android {" >> gradle_patch.txt
          echo "                compileSdkVersion 34" >> gradle_patch.txt
          echo "                defaultConfig {" >> gradle_patch.txt
          echo "                    minSdkVersion 21" >> gradle_patch.txt
          echo "                    targetSdkVersion 34" >> gradle_patch.txt
          echo "                }" >> gradle_patch.txt
          echo "            }" >> gradle_patch.txt
          echo "        }" >> gradle_patch.txt
          echo "    }" >> gradle_patch.txt
          echo "}" >> gradle_patch.txt
          cat gradle_patch.txt >> android/build.gradle
          rm gradle_patch.txt

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK Final Release
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "build/app/outputs/flutter-apk/app-release.apk"
