name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Flutter Android Project
        run: |
          rm -rf android
          flutter create . --platforms=android --org com.castbrowser.app

      # سطر سحري لتعديل الـ minSdkVersion تلقائياً إلى 21 لتتوافق مع مكتبة المتصفح
      - name: Configure Android SDK Versions
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle || true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
