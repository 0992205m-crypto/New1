name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # تحديث الحزمة إلى إصدار v4 لتجنب مشكلة Node.js القديم
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # تحديث حزمة فلاتر للإصدار المتوافق مع التحديثات الجديدة
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Flutter Project Structure if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --org com.castbrowser.app
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
