name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # إنشاء مشروع جديد كلياً في مجلد مؤقت لنقل ملفات الأندرويد النظيفة والجاهزة
      - name: Generate Clean Android Structure
        run: |
          mkdir temp_project
          cd temp_project
          flutter create --platforms=android --org com.castbrowser.app clean_app
          cd ..
          # نقل ملفات الأندرويد المهيأة بشكل صحيح إلى مجلد مشروعك الرئيسي
          mv temp_project/clean_app/android .
          rm -rf temp_project

      # ضبط إعدادات الـ SDK المتوافقة مع مكتبة الـ WebView تلقائياً
      - name: Force Update Android SDK Versions
        run: |
          sed -i 's/minSdkVersion.*/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/targetSdkVersion.*/targetSdkVersion 34/g' android/app/build.gradle
          sed -i 's/compileSdkVersion.*/compileSdkVersion 34/g' android/app/build.gradle

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK Final Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
