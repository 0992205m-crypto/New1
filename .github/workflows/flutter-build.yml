name: Build Flutter APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Clean Build Cache
        run: flutter clean

      # هذه الخطوة البديلة والآمنة تقوم بتحديث إصدارات الـ SDK للمشروع وكل المكتبات بدون أي مشاكل في علامات التنصيص
      - name: Set SDK Versions Globally via Flutter Config
        run: |
          flutter config --android-sdk /usr/local/lib/android/sdk
          cd android
          echo "flutter.compileSdkVersion=34" >> local.properties
          echo "flutter.minSdkVersion=21" >> local.properties
          echo "flutter.targetSdkVersion=34" >> local.properties

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK Final Release
        run: flutter build apk --release --no-tree-shake-icons --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "build/app/outputs/flutter-apk/app-release.apk"
